name: Trading Research Agent

on:
  schedule:
    # Full research run — daily at 01:00 UTC (6:30am IST)
    - cron: '0 1 * * *'
    # Alert check — every hour
    - cron: '0 * * * *'
    # NSE market hours alert check — every 30min (3:45am–10:30am UTC)
    - cron: '*/30 3-10 * * 1-5'
    # NYSE market hours alert check — every 30min (9:30am–4pm EST = 14:30–21:00 UTC)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent run mode'
        required: false
        default: '--run'
        type: choice
        options:
          - '--run'
          - '--quick'
          - '--macro'
          - '--scan'
          - '--alert-check'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: trading-agent/requirements.txt

      - name: Install dependencies
        working-directory: trading-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create directories
        working-directory: trading-agent
        run: mkdir -p reports state

      - name: Determine run mode
        id: mode
        run: |
          # Hourly runs use alert-check, daily uses full run, manual uses input
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "Running in manual mode: ${{ github.event.inputs.mode }}"
          elif [ "$HOUR" = "01" ] && [ "$MINUTE" -lt "30" ]; then
            echo "mode=--run" >> $GITHUB_OUTPUT
            echo "Running full cycle (daily scheduled run)"
          else
            echo "mode=--alert-check" >> $GITHUB_OUTPUT
            echo "Running alert check (hourly)"
          fi

      - name: Run Trading Research Agent
        working-directory: trading-agent
        run: python agent.py ${{ steps.mode.outputs.mode }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          PYTHONUNBUFFERED: "1"

      - name: Show generated reports
        working-directory: trading-agent
        if: always()
        run: |
          echo "=== Reports Directory ==="
          ls -la reports/ 2>/dev/null || echo "No reports generated"
          echo ""
          if [ -f "reports/daily-brief.md" ]; then
            echo "=== Daily Brief (first 50 lines) ==="
            head -50 reports/daily-brief.md
          fi

      - name: Commit updated reports and state
        if: always()
        run: |
          git config user.name "trading-agent[bot]"
          git config user.email "trading-agent@users.noreply.github.com"
          
          git add trading-agent/reports/ trading-agent/state/ 2>/dev/null || true
          
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "[agent] ${MODE} — ${TIMESTAMP}"
            git push
            echo "✓ Reports committed and pushed"
          fi

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-reports-${{ github.run_number }}
          path: trading-agent/reports/
          retention-days: 30

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-logs-${{ github.run_number }}
          path: trading-agent/trading-agent.log
          retention-days: 7
